{% extends 'base.html' %}
{% block title %}New Task - TaskFlow{% endblock %}
{%block content%}
<div class="row mt-4">
    <div class="col-md-6 offset-md-3">
        <h2>{% if task %}Edit Task{% else %}Create New Task{% endif %}</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Title</label>
                {{ form.title }}
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                {{ form.description }}
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                {{ form.status }}
            </div>
            <div class="mb-3">
                <label class="form-label">Priority</label>
                {{ form.priority }}
            </div>
            <div class="mb-3">
                <label class="form-label">Due Date</label>
                {{ form.due_date }}
            </div>
            <button type="submit" class="btn btn-dark">Save Task</button>
            <a href="{% url 'task-list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
